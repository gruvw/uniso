<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniso</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      font-family: sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .uniso-container {
      display: flex;
      justify-content: center;
      margin: 20px;

      position: relative;
    }

    .uniso {
      --top-width: 40px;

      display: flex;
      width: fit-content;
    }

    .key {
      display: inline-flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;

      padding-bottom: 20px;

      border: 2px solid black;
      background-color: white;
    }

    .btm {
      width: 65px;
      height: 200px;
      border-left: none;
    }

    .btm:first-child {
      border-left: 2px solid black;
    }

    .top {
      width: var(--top-width);
      height: 130px;
      margin: 0 calc(-1*var(--top-width)/2);
      z-index: 2;
    }

    #top-1,
    #btm-1,
    #btm-2 {
      cursor: pointer;
    }

    .dropdown-container {
      display: none;

      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    .note-dropdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;

      padding: 10px;
      border: 2px solid black;

      background-color: white;

      list-style: none;
    }

    .note-dropdown li {
      display: inline-block;
      text-align: center;

      width: 30px;
      padding: 5px;

      border: 1px solid black;

      cursor: pointer;
    }

    .note-dropdown li:hover {
      background-color: #eee;
    }

    .note-dropdown li.disabled {
      background-color: grey;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="uniso-container">
    <div class="dropdown-container" id="note-select">
      <ul class="note-dropdown">
      </ul>
    </div>

    <div class="uniso">
      <span class="key btm" id="btm-1">?</span>
      <span class="key top" id="top-1">?</span>
      <span class="key btm" id="btm-2">?</span>
      <span class="key top"></span>
      <span class="key btm"></span>
      <span class="key top"></span>
      <span class="key btm"></span>
      <span class="key top"></span>
      <span class="key btm"></span>
      <span class="key top"></span>
      <span class="key btm"></span>
      <span class="key top"></span>
    </div>
  </div>

  <script>
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    const keys = [
      document.getElementById("btm-1"),
      document.getElementById("btm-2"),
      document.getElementById("top-1"),
    ];
    const noteSelect = document.getElementById("note-select");

    // state
    let currentSelectIndex = 0;
    let notesIndex = [-1, -1, -1];

    function isValidNotes(btm1, btm2, top1) {
      const btm = [];

      const step = (btm2 - btm1 + NOTES.length) % NOTES.length;

      for (let i = 0; i < NOTES.length / 2; i++) {
        const btmNoteIdx = (btm1 + i * step) % NOTES.length;
        btm.push(NOTES[btmNoteIdx]);
      }

      if (new Set(myArray).size === 12) {

      }

      const top = NOTES.filter(note => !btm.includes(note));
      console.log(top);

      if (!top.includes(NOTES[top1])) {
        return false;
      }

      return true;
    }

    function updateDisabled(disabled) {
      const selects = noteSelect.querySelectorAll("li");

      selects.forEach((select, i) => {
        if (disabled.includes(i)) {
          select.classList.add("disabled");
        } else {
          select.classList.remove("disabled");
        }
      });
    }

    function showNoteSelect(index) {
      currentSelectIndex = index;

      if (currentSelectIndex === 0) {
        updateDisabled([notesIndex[1]]);
      } else if (currentSelectIndex === 1) {
        updateDisabled([notesIndex[0]]);
      } else {
        if (notesIndex[0] != -1 && notesIndex[1] != -1) {
          const disabledIndices = [];

          NOTES.forEach((_, i) => {
            if (!isValidNotes(notesIndex[0], notesIndex[1], i)) {
              disabledIndices.push(i);
            }
          });

          updateDisabled(disabledIndices);
        } else {
          updateDisabled([]);
        }
      }

      noteSelect.style.display = "block";
    }

    function hideNoteSelect() {
      noteSelect.style.display = "none";
    }

    function update() {
      keys.forEach((key, i) => {
        const noteIndex = notesIndex[i];
        if (noteIndex != -1) {
          key.textContent = NOTES[noteIndex];
        }
      });

      if (notesIndex.includes(-1) || !isValidNotes(...notesIndex)) {
        return;
      }
    }

    NOTES.forEach((note, i) => {
      const li = document.createElement("li");
      li.textContent = note;

      li.addEventListener("click", () => {
        if (li.classList.contains("disabled")) {
          return;
        }

        notesIndex[currentSelectIndex] = i;
        update();
        hideNoteSelect();
      });

      noteSelect.querySelector("ul").appendChild(li);
    });

    keys.forEach((key, i) => {
      key.addEventListener("click", (e) => {
        e.stopPropagation();
        showNoteSelect(i);
      });
    });

    document.addEventListener("click", (e) => {
      if (!noteSelect.contains(e.target)) {
        hideNoteSelect();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        hideNoteSelect();
      }
    });
  </script>
</body>

</html>
